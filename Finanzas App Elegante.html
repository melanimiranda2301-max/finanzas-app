<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miranda Private Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js">
// --- Analisis financiero simple ---
function financialAI(){
 let msg="";
 if(expenseTotal>incomeTotal){
 msg="Estás gastando más de lo que ingresas.";
 }else if(incomeTotal>0){
 let ratio=(expenseTotal/incomeTotal*100).toFixed(0);
 msg="Has usado "+ratio+"% de tus ingresos.";
 }
 document.getElementById('ai').innerText=msg;
}

// prediccion simple fin de mes
function prediction(){
 let predicted=incomeTotal-expenseTotal;
 document.getElementById('prediction').innerText="$"+predicted;
}

setInterval(()=>{
 financialAI();
 prediction();
},1000);

</script>

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
color:#f6f2ee;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background-image:url("/mnt/data/-16.jpg");
background-size:cover;
background-position:center;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.65);
backdrop-filter:blur(4px);
}

.app{
position:relative;
width:480px;
background:#160d09;
border-radius:26px;
padding:30px;
box-shadow:0 40px 90px rgba(0,0,0,.7);
border:1px solid rgba(212,175,55,.3);
z-index:2;
animation:fade .8s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

.header h1{
font-family:'Playfair Display',serif;
font-size:30px;
color:#d4af37;
margin:0;
letter-spacing:1px;
text-align:center;
margin-bottom:20px;
}

.balance{
background:#21120c;
padding:25px;
border-radius:18px;
text-align:center;
margin-bottom:18px;
border:1px solid rgba(212,175,55,.25);
}

.balance h2{
margin:8px 0 0 0;
font-size:38px;
font-family:'Playfair Display',serif;
}

.accounts{
display:flex;
gap:10px;
margin-bottom:15px;
}

.account-card{
flex:1;
padding:12px;
border-radius:14px;
background:#2a1711;
border:1px solid rgba(212,175,55,.2);
cursor:pointer;
text-align:center;
font-size:13px;
transition:.25s;
}

.account-card:hover{
transform:translateY(-2px);
border-color:#d4af37;
}

.form{
display:flex;
flex-direction:column;
gap:10px;
}

input,select{
padding:12px;
border-radius:12px;
border:none;
font-size:14px;
background:#f3ebe6;
color:#2a1812;
}

.buttons{
display:flex;
gap:8px;
}

button.action{
padding:12px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#d4af37,#f1d77a);
color:#2a1812;
font-weight:600;
cursor:pointer;
flex:1;
}

.chart,.chart2,.chart3{
background:#f6f2ee;
padding:14px;
border-radius:16px;
margin-top:16px;
}

.history{
margin-top:16px;
max-height:120px;
overflow:auto;
font-size:13px;
}

.history div{
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.goal{
margin-top:16px;
background:#21120c;
padding:16px;
border-radius:14px;
border:1px solid rgba(212,175,55,.2);
}

.goal progress{
width:100%;
height:10px;
}

.lock{
position:fixed;
inset:0;
background:#120a07;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:5;
}

.lock input{margin-top:10px}
.lock button{margin-top:10px}

</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a0f0b">
<style>
.install-btn{position:fixed;bottom:25px;right:25px;background:linear-gradient(135deg,#d4af37,#f1d77a);color:#1a0f0b;border:none;padding:12px 18px;border-radius:14px;font-weight:600;cursor:pointer;box-shadow:0 10px 25px rgba(0,0,0,.4)}
</style>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

<div class="overlay"></div>

<div class="lock" id="lock">
<h2>Miranda Private Finance</h2>
<p>Contraseña</p>
<input type="password" id="pass">
<button onclick="unlock()">Entrar</button>
</div>

<div class="app">

<div class="header">
<h1>Miranda Private Finance</h1>
</div>

<div class="balance">
<p>Balance Total</p>
<h2 id="balance">$0</h2>
</div>

<div class="accounts">
<div class="account-card" onclick="setAccount('efectivo')">Efectivo</div>
<div class="account-card" onclick="setAccount('tarjeta')">Tarjeta</div>
<div class="account-card" onclick="setAccount('ahorro')">Ahorro</div>
</div>

<div class="form">

<input type="number" id="amount" placeholder="Cantidad">

<select id="category">
<option>Comida</option>
<option>Transporte</option>
<option>Escuela</option>
<option>Ropa</option>
<option>Otros</option>
</select>

<div class="buttons">
<button class="action" onclick="addIncome()">Ingreso</button>
<button class="action" onclick="addExpense()">Gasto</button>
</div>

</div>

<div class="goal">
<p>Meta de ahorro</p>
<input type="number" id="goalInput" placeholder="Meta de dinero">
<progress id="goalBar" value="0" max="100"></progress>
</div>

<div class="chart">
<canvas id="chart"></canvas>
</div>

<div class="chart2">
<canvas id="chart2"></canvas>
</div>

<div class="chart2">
<canvas id="chart3"></canvas>
</div>

<div style="margin-top:14px;background:#22120c;padding:16px;border-radius:16px;border:1px solid rgba(212,175,55,.25)">
<p style="margin:0;font-size:12px;opacity:.7">Meta de ahorro</p>
<input type="number" id="goalInput" placeholder="Meta $" style="margin-top:8px;width:100%">
<div style="margin-top:10px;background:#3a2319;border-radius:10px;height:10px;overflow:hidden">
<div id="goalBar" style="height:100%;width:0%;background:linear-gradient(90deg,#d4af37,#f1d77a)"></div>
</div>
</div>
<canvas id="chart2"></canvas>
</div>

<div class="chart3">
<canvas id="chart3"></canvas>
</div>

<div class="history" id="history"></div>

<div style="margin-top:16px;background:#22120c;padding:16px;border-radius:16px;border:1px solid rgba(212,175,55,.25)">
<p style="margin:0;font-size:12px;opacity:.7">Análisis financiero</p>
<h3 id="ai" style="margin:6px 0 0 0;font-family:'Playfair Display',serif"></h3>
</div>

<div style="margin-top:12px;background:#22120c;padding:16px;border-radius:16px;border:1px solid rgba(212,175,55,.25)">
<p style="margin:0;font-size:12px;opacity:.7">Predicción fin de mes</p>
<h3 id="prediction" style="margin:6px 0 0 0;font-family:'Playfair Display',serif">$0</h3>
</div>

</div>

<script>

let password="1234"

function unlock(){
let p=document.getElementById("pass").value
if(p===password){
document.getElementById("lock").style.display="none"
}
}

let account="efectivo"

let balance = Number(localStorage.getItem("balance")) || 0

let data = JSON.parse(localStorage.getItem("data")) || {
Comida:0,
Transporte:0,
Escuela:0,
Ropa:0,
Otros:0
}

let incomeTotal = Number(localStorage.getItem("income")) || 0
let expenseTotal = Number(localStorage.getItem("expense")) || 0

let history = JSON.parse(localStorage.getItem("history")) || []

let goal = Number(localStorage.getItem("goal")) || 0

const chart = new Chart(document.getElementById('chart'),{ 
 type:'doughnut',
 data:{
 labels:Object.keys(data),
 datasets:[{
 data:Object.values(data),
 backgroundColor:["#6f4e37","#a47148","#c19a6b","#e6c79c","#d4af37"]
 }]
 }
})

const chart2=new Chart(document.getElementById('chart2'),{
type:'bar',
data:{labels:["Ingresos","Gastos"],datasets:[{data:[incomeTotal,expenseTotal]}]}
})

const chart3=new Chart(document.getElementById('chart3'),{
type:'line',
data:{labels:["Inicio","Actual"],datasets:[{data:[0,balance]}]}
})

function setAccount(name){account=name}

function save(){
localStorage.setItem("balance",balance)
localStorage.setItem("data",JSON.stringify(data))
localStorage.setItem("history",JSON.stringify(history))
localStorage.setItem("income",incomeTotal)
localStorage.setItem("expense",expenseTotal)
localStorage.setItem("goal",goal)
}

function addIncome(){
let amount = Number(document.getElementById('amount').value)
if(!amount) return
balance += amount
incomeTotal+=amount
history.unshift("Ingreso +$"+amount+" • "+account)
update()
}

function addExpense(){
let amount = Number(document.getElementById('amount').value)
let category = document.getElementById('category').value
if(!amount) return
balance -= amount
expenseTotal+=amount

data[category]+=amount

history.unshift("Gasto -$"+amount+" • "+category+" • "+account)
update()
}

function update(){

document.getElementById('balance').innerText = "$"+balance

chart.data.datasets[0].data = Object.values(data)
chart.update()

chart2.data.datasets[0].data=[incomeTotal,expenseTotal]
chart2.update()

chart3.data.datasets[0].data=[0,balance]
chart3.update()

let list=""
history.slice(0,10).forEach(item=>{list+=`<div>${item}</div>`})

document.getElementById('history').innerHTML=list

let goalInput=document.getElementById('goalInput').value
if(goalInput){goal=goalInput}

if(goal>0){
let percent=(balance/goal)*100
if(percent>100)percent=100

document.getElementById("goalBar").value=percent
}

save()
}

update()

</script>

<button class="install-btn" id="installBtn" style="display:none">Instalar App</button>

<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
 e.preventDefault();
 deferredPrompt=e;
 document.getElementById('installBtn').style.display='block';
});

document.getElementById('installBtn').addEventListener('click',async()=>{
 if(!deferredPrompt) return;
 deferredPrompt.prompt();
 const {outcome}=await deferredPrompt.userChoice;
 deferredPrompt=null;
});
</script>
</body>
</html>
